<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Card Slider</title>
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="swiper-bundle.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="swiper2.css">
</head>
<body>
    <div class="slide-container swiper">
        <div class="slide-content">
            <div class="card-wrapper swiper-wrapper">
                <div class="swiper-slide">
                    <div class="wrap">
                        <div class="item">
                            <p>Pride & Prejudice <i class='bx bxs-book-open'></i> </p>
                            <img src="https://th.bing.com/th/id/R.c1c6633e41f81590f94188bfda47f1c4?rik=Y8yYxcTO5JDqfg&riu=http%3a%2f%2fd28hgpri8am2if.cloudfront.net%2fbook_images%2fonix%2fcvr9781471134746%2fpride-and-prejudice-9781471134746_hr.jpg&ehk=x2q%2fXHpsXqzUEAXbe4Bq%2f7uW8D%2fDjubqcxy5Kr9N93g%3d&risl=&pid=ImgRaw&r=0" alt="Book Cover">
                        </div>
                    </div>
                </div>
                <div class="swiper-slide">
                    <div class="wrap">
                        <div class="item">
                            <p>1984 <i class='bx bxs-book-open'></i> </p>
                            <img src="https://i.thenile.io/r1000/9780452262935.jpg?r=5e7d61110b596" alt="Book Cover">
                        </div>
                    </div>
                </div>
                <div class="swiper-slide">
                    <div class="wrap">
                        <div class="item">
                            <p>To Kill A Mocking Bird <i class='bx bxs-book-open'></i> </p>
                            <img src="https://th.bing.com/th/id/OIP.8aK7lEx70a-l2PAysUN8twHaKj?rs=1&pid=ImgDetMain" alt="Book Cover">
                        </div>
                    </div>
                </div>
                <div class="swiper-slide">
                    <div class="wrap">
                        <div class="item">
                            <p>Romeo & Juliet <i class='bx bxs-book-open'></i> </p>
                            <img src="https://i.thenile.io/r1000/9781517283148.jpg?r=609502ad34ec5" alt="Book Cover">
                        </div>
                    </div>
                </div>
                <div class="swiper-slide">
                    <div class="wrap">
                        <div class="item">
                            <p>The Hunger Games <i class='bx bxs-book-open'></i> </p>
                            <img src="https://www.bestofyabooks.nl/sites/default/files/covers/hires/9789000337071.jpg" alt="Book Cover">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="swiper-button-next swiper-navBtn"></div>
        <div class="swiper-button-prev swiper-navBtn"></div>
        <div class="swiper-pagination"></div>
    </div>
</body>
<!-- Swiper JS -->
<script src="swiper-bundle.min.js"></script>

<!-- JavaScript -->
<script src="swiper2.js"></script>
</html>
